name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Recommended for modern Capacitor
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build # Ensure your package.json has a build script

      - name: Capacitor Sync
        # This creates/updates the android folder and copies web assets
        run: npx cap sync android

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.run_id }}
          # Using a double wildcard (**) handles varying build flavors/folders
          path: android/app/build/outputs/apk/debug/**/*.apk
          if-no-files-found: error
